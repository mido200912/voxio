<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VOXIO - منصة ذكية لإدارة الشركات مع Chatbot مدعوم بالذكاء الاصطناعي" />
  <meta name="keywords" content="AI, Chatbot, إدارة الشركات, ذكاء اصطناعي, VOXIO" />
  <meta name="tiktok-developers-site-verification" content="NsuJxtYKfpBtePGW5GtIjOc96iRy9qat" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Poppins:wght@300;400;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <title>VOXIO - منصة الذكاء الاصطناعي للشركات</title>
</head>

<body>
  <div id="root">
    <!-- Splash Loader (disappears when React mounts) -->
    <div id="splash-loader" style="
      position:fixed;top:0;left:0;width:100vw;height:100vh;
      background:#000;display:flex;flex-direction:column;
      justify-content:center;align-items:center;z-index:99999;
    ">
      <div style="position:relative;width:100px;height:100px;margin-bottom:25px;">
        <div style="
          position:absolute;top:0;left:0;width:100%;height:100%;
          border-radius:50%;border:3px solid transparent;
          border-top-color:#fff;border-right-color:rgba(255,255,255,0.1);
          animation:splashSpin 1.5s linear infinite;
        "></div>
        <div style="
          position:absolute;top:15%;left:15%;width:70%;height:70%;
          border-radius:50%;border:3px solid transparent;
          border-bottom-color:#6C63FF;border-left-color:rgba(108,99,255,0.2);
          animation:splashSpin 1s linear infinite reverse;
        "></div>
        <img src="/logo.png" alt="VOXIO" style="
          position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
          width:45px;height:45px;object-fit:contain;
          animation:splashPulse 2s infinite ease-in-out;
        " />
      </div>
      <p style="
        color:#b3b3b3;font-family:'Cairo',sans-serif;font-size:1.1rem;
        font-weight:600;letter-spacing:1px;animation:splashFade 1.5s infinite alternate;
      ">جاري التحميل...</p>
    </div>
    <style>
      @keyframes splashSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
      @keyframes splashPulse{0%,100%{transform:translate(-50%,-50%) scale(0.9);opacity:0.8}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}
      @keyframes splashFade{0%{opacity:0.5}100%{opacity:1}}
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
